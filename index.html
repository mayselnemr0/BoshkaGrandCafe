<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boshka Cafe 🐒</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  body{
    min-height:100vh;
    background:#0a1904;
    font-family:'Nunito',sans-serif;
    display:flex;
    justify-content:center;
    overflow-x:hidden;
  }

  .page{
    width:100%;
    max-width:500px;
    min-height:100vh;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:
      radial-gradient(ellipse 90% 45% at 50% 0%,#1d4a09 0%,transparent 65%),
      radial-gradient(ellipse 55% 35% at 0% 55%,#102c05 0%,transparent 55%),
      radial-gradient(ellipse 55% 35% at 100% 40%,#102c05 0%,transparent 55%),
      radial-gradient(ellipse 70% 40% at 50% 100%,#2a0d01 0%,transparent 60%),
      linear-gradient(180deg,#091703 0%,#111c06 35%,#1c0e02 70%,#120800 100%);
  }

  /* ── Jungle SVG frame ── */
  .jungle-frame{
    position:absolute;top:0;left:0;width:100%;height:100%;
    pointer-events:none;overflow:hidden;
  }

  /* ── Header ── */
  .header{
    width:100%;text-align:center;
    padding:52px 24px 0;
    position:relative;z-index:5;
    animation:fadeUp .7s ease both;
  }

  .monkey-avatar{
    width:100px;height:100px;border-radius:50%;
    border:4px solid #f5c200;
    box-shadow:0 0 0 6px rgba(245,194,0,.18),0 10px 36px rgba(0,0,0,.65);
    background:linear-gradient(145deg,#2e6b0e,#1a3a06);
    display:flex;align-items:center;justify-content:center;
    font-size:50px;margin:0 auto 16px;
  }

  .logo-name{
    font-family:'Fredoka One',cursive;
    font-size:58px;
    color:#f5c200;
    text-shadow:3px 3px 0 #8b4500,6px 6px 0 #3d1e00,0 0 40px rgba(245,194,0,.35);
    line-height:1;letter-spacing:2px;
  }

  .logo-leaves{
    font-size:20px;letter-spacing:4px;
    display:block;margin-top:2px;
  }

  .arabic{
    font-size:20px;color:#c8e87a;font-weight:800;
    direction:rtl;margin-top:6px;
  }

  .tagline{
    font-size:12px;color:rgba(200,232,122,.6);
    letter-spacing:3.5px;text-transform:uppercase;
    font-weight:700;margin-top:5px;
  }

  /* ── Divider ── */
  .divider{
    display:flex;align-items:center;gap:10px;
    width:calc(100% - 48px);max-width:400px;
    margin:22px auto 26px;
  }
  .div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,#4d9e1a55,transparent);}
  .div-icon{font-size:18px;}

  /* ── Link buttons ── */
  .links{
    width:100%;padding:0 22px;
    display:flex;flex-direction:column;gap:13px;
    position:relative;z-index:5;
    animation:fadeUp .7s .15s ease both;
  }

  .btn{
    display:flex;align-items:center;gap:14px;
    padding:16px 20px;border-radius:18px;
    text-decoration:none;border:none;cursor:pointer;
    width:100%;position:relative;overflow:hidden;
    transition:transform .18s ease,filter .18s ease,box-shadow .18s ease;
  }
  .btn:hover{transform:translateY(-3px) scale(1.015);filter:brightness(1.1);}
  .btn:active{transform:scale(0.97);}

  .btn-menu{
    background:linear-gradient(135deg,#7a3e00,#b05c00 45%,#7a3e00);
    box-shadow:0 6px 24px rgba(122,62,0,.55),inset 0 1px 0 rgba(255,220,120,.2);
    border:1.5px solid #d48830;
  }
  .btn-maps{
    background:linear-gradient(135deg,#c0380a,#f05520 50%,#c0380a);
    box-shadow:0 6px 24px rgba(192,56,10,.45),inset 0 1px 0 rgba(255,180,130,.2);
    border:1.5px solid #ff6840;
  }
  .btn-fb{
    background:linear-gradient(135deg,#0d4fa3,#1e8af5 50%,#0d4fa3);
    box-shadow:0 6px 24px rgba(24,119,242,.4),inset 0 1px 0 rgba(160,200,255,.2);
    border:1.5px solid #4a9eff;
  }
  .btn-ig{
    background:linear-gradient(135deg,#833ab4 0%,#fd1d1d 45%,#f77737 100%);
    box-shadow:0 6px 24px rgba(253,29,29,.35),inset 0 1px 0 rgba(255,200,200,.2);
    border:1.5px solid #ff6060;
  }

  .new-badge{
    position:absolute;top:-8px;right:14px;
    background:#3db52a;color:#fff;
    font-size:10px;font-weight:800;letter-spacing:1px;
    padding:3px 10px;border-radius:50px;
    text-transform:uppercase;
    box-shadow:0 2px 8px rgba(61,181,42,.5);
  }

  .icon-box{
    width:44px;height:44px;border-radius:12px;
    background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;font-size:22px;
  }
  .icon-box svg{width:24px;height:24px;fill:white;}

  .btn-body{flex:1;text-align:left;}
  .btn-title{
    font-family:'Fredoka One',cursive;
    font-size:18px;color:#fff;display:block;line-height:1.2;
  }
  .btn-hint{font-size:11.5px;color:rgba(255,255,255,.7);font-weight:700;letter-spacing:.4px;}
  .btn-arrow{color:rgba(255,255,255,.6);font-size:22px;flex-shrink:0;line-height:1;}

  /* ── QR section ── */
  .qr-section{
    width:100%;padding:0 22px;
    margin-top:28px;
    position:relative;z-index:5;
    animation:fadeUp .7s .3s ease both;
  }
  .qr-card{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(180,230,90,.2);
    border-radius:22px;
    padding:28px 20px 26px;
    text-align:center;
  }
  .qr-title{
    font-family:'Fredoka One',cursive;
    font-size:20px;color:#f5c200;margin-bottom:4px;
  }
  .qr-sub{font-size:12px;color:#90bc50;margin-bottom:18px;letter-spacing:.5px;}
  .qr-inner{
    display:inline-block;
    background:#fff;padding:14px;border-radius:14px;
    box-shadow:0 8px 32px rgba(0,0,0,.5);
    position:relative;
  }
  .qr-inner canvas{display:block;border-radius:4px;}
  .qr-center{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:38px;height:38px;
    background:#fff;border-radius:8px;
    font-size:22px;line-height:38px;
    border:2.5px solid #f5c200;
    text-align:center;
  }
  .dl-btn{
    margin-top:16px;
    display:inline-flex;align-items:center;gap:8px;
    padding:12px 28px;
    background:linear-gradient(135deg,#f5c200,#e8a800);
    border:none;border-radius:50px;
    font-family:'Fredoka One',cursive;font-size:16px;
    color:#3d1e00;cursor:pointer;
    box-shadow:0 4px 16px rgba(245,194,0,.4);
    transition:transform .2s,box-shadow .2s;
    text-decoration:none;
  }
  .dl-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(245,194,0,.5);}
  .dl-btn:active{transform:scale(0.97);}

  /* ── Footer ── */
  .footer{
    text-align:center;
    padding:30px 20px 50px;
    font-size:12px;color:rgba(140,190,70,.4);
    font-weight:700;letter-spacing:1.5px;
    position:relative;z-index:5;
    animation:fadeUp .7s .4s ease both;
  }

  /* ── Animations ── */
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(26px)}
    to{opacity:1;transform:translateY(0)}
  }
  @keyframes sway{
    0%,100%{transform:rotate(-2.5deg)}
    50%{transform:rotate(2.5deg)}
  }
  .sway-l{animation:sway 4.5s ease-in-out infinite;}
  .sway-r{animation:sway 3.8s ease-in-out infinite reverse;}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  var SITE_URL = window.location.href.split('?')[0].split('#')[0] || 'https://boshkacafe.github.io';

  function buildQR() {
    var wrap = document.createElement('div');
    wrap.style.display = 'none';
    document.body.appendChild(wrap);
    try {
      new QRCode(wrap, {
        text: SITE_URL,
        width: 180, height: 180,
        colorDark: '#1a0d02',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      setTimeout(function () {
        var src = wrap.querySelector('canvas') || wrap.querySelector('img');
        var dest = document.getElementById('qrCanvas');
        var ctx = dest.getContext('2d');
        if (src && src.tagName === 'CANVAS') {
          ctx.drawImage(src, 0, 0, 180, 180);
        } else if (src) {
          var img = new Image();
          img.onload = function () { ctx.drawImage(img, 0, 0, 180, 180); };
          img.src = src.src;
        }
        document.body.removeChild(wrap);
      }, 400);
    } catch (e) { document.body.removeChild(wrap); }
  }

  function downloadQR() {
    var a = document.createElement('a');
    a.download = 'boshka-cafe-qr.png';
    a.href = document.getElementById('qrCanvas').toDataURL('image/png');
    a.click();
  }

  window.addEventListener('load', function () { setTimeout(buildQR, 500); });
</script>
